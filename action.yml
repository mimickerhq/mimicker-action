name: 'Mimicker'
description: 'Start a Mimicker HTTP mock server for use in CI workflows'
author: 'mimickerhq'

branding:
  icon: 'server'
  color: 'blue'

inputs:
  port:
    description: 'Port to run Mimicker on'
    required: false
    default: '8080'
  config:
    description: 'Path to a stubs YAML file (relative to workspace root)'
    required: false
    default: ''
  version:
    description: 'Mimicker PyPI version to install (e.g. "0.4.2"). Defaults to latest.'
    required: false
    default: ''
  wait-timeout:
    description: 'Seconds to wait for the server to become healthy'
    required: false
    default: '30'

outputs:
  url:
    description: 'Base URL of the running Mimicker server (e.g. http://localhost:8080)'
    value: ${{ steps.start.outputs.url }}

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Start Mimicker
      id: start
      shell: bash
      run: |
        PORT="${{ inputs.port }}"
        TIMEOUT="${{ inputs.wait-timeout }}"

        # Install — pin the Python we use so pip and the server share the same interpreter
        PYTHON=$(which python)
        if [ -n "${{ inputs.version }}" ]; then
          "$PYTHON" -m pip install --quiet "mimicker==${{ inputs.version }}"
        else
          "$PYTHON" -m pip install --quiet mimicker
        fi

        SERVE_ARGS="--port ${PORT}"
        if [ -n "${{ inputs.config }}" ]; then
          SERVE_ARGS="${SERVE_ARGS} --config ${{ github.workspace }}/${{ inputs.config }}"
        fi

        printf 'from mimicker.cli import main\nmain()\n' > /tmp/mimicker_run.py
        nohup "$PYTHON" /tmp/mimicker_run.py serve $SERVE_ARGS > /tmp/mimicker-${PORT}.log 2>&1 &
        echo $! > /tmp/mimicker-${PORT}.pid
        echo "Mimicker PID: $(cat /tmp/mimicker-${PORT}.pid)"

        echo "Waiting for Mimicker to be ready on port ${PORT}..."
        HEALTH="http://localhost:${PORT}/__mimicker__/health"
        for i in $(seq 1 $TIMEOUT); do
          if curl -sf "$HEALTH" > /dev/null 2>&1; then
            echo "Mimicker is ready."
            break
          fi
          if [ "$i" -eq "$TIMEOUT" ]; then
            echo "Mimicker did not become healthy within ${TIMEOUT}s." >&2
            cat /tmp/mimicker-${PORT}.log >&2
            exit 1
          fi
          sleep 1
        done

        echo "url=http://localhost:${PORT}" >> "$GITHUB_OUTPUT"
