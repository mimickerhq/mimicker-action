name: 'Mimicker'
description: 'Start a Mimicker HTTP mock server for use in CI workflows'
author: 'mimickerhq'

branding:
  icon: 'server'
  color: 'blue'

inputs:
  port:
    description: 'Port to run Mimicker on'
    required: false
    default: '8080'
  config:
    description: 'Path to a stubs YAML file (relative to workspace root)'
    required: false
    default: ''
  version:
    description: 'Mimicker PyPI version to install (e.g. "0.4.2"). Defaults to latest.'
    required: false
    default: ''
  wait-timeout:
    description: 'Seconds to wait for the server to become healthy'
    required: false
    default: '30'
  fail-on-unused:
    description: 'Fail the job if any stubs were never hit (detects test decay)'
    required: false
    default: 'false'

outputs:
  url:
    description: 'Base URL of the running Mimicker server (e.g. http://localhost:8080)'
    value: ${{ steps.start.outputs.url }}
  report-script:
    description: 'Path to a shell script that prints the stub coverage report. Call it with if: always() after your tests.'
    value: ${{ steps.start.outputs.report-script }}

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Start Mimicker
      id: start
      shell: bash
      run: |
        PORT="${{ inputs.port }}"
        TIMEOUT="${{ inputs.wait-timeout }}"
        FAIL_ON_UNUSED="${{ inputs.fail-on-unused }}"

        # Pin the Python interpreter so pip install and the server share the same one
        PYTHON=$(which python)
        if [ -n "${{ inputs.version }}" ]; then
          "$PYTHON" -m pip install --quiet "mimicker==${{ inputs.version }}"
        else
          "$PYTHON" -m pip install --quiet mimicker
        fi

        SERVE_ARGS="--port ${PORT}"
        if [ -n "${{ inputs.config }}" ]; then
          SERVE_ARGS="${SERVE_ARGS} --config ${{ github.workspace }}/${{ inputs.config }}"
        fi

        printf 'from mimicker.cli import main\nmain()\n' > /tmp/mimicker_run.py
        nohup "$PYTHON" /tmp/mimicker_run.py serve $SERVE_ARGS > /tmp/mimicker-${PORT}.log 2>&1 &
        echo $! > /tmp/mimicker-${PORT}.pid
        echo "Mimicker PID: $(cat /tmp/mimicker-${PORT}.pid)"

        echo "Waiting for Mimicker to be ready on port ${PORT}..."
        HEALTH="http://localhost:${PORT}/__mimicker__/health"
        for i in $(seq 1 $TIMEOUT); do
          if curl -sf "$HEALTH" > /dev/null 2>&1; then
            echo "Mimicker is ready."
            break
          fi
          if [ "$i" -eq "$TIMEOUT" ]; then
            echo "Mimicker did not become healthy within ${TIMEOUT}s." >&2
            cat /tmp/mimicker-${PORT}.log >&2
            exit 1
          fi
          sleep 1
        done

        # Write a report script that callers can invoke with `if: always()`
        REPORT_SCRIPT="/tmp/mimicker-report-${PORT}.sh"
        cat > "$REPORT_SCRIPT" <<REPORT_EOF
#!/bin/sh
set -e
REPORT_URL="http://localhost:${PORT}/__mimicker__/report"
REPORT_JSON=\$(curl -sf "\$REPORT_URL" || echo "")
if [ -z "\$REPORT_JSON" ]; then
  echo "Mimicker report: server not reachable at \$REPORT_URL" >> "\$GITHUB_STEP_SUMMARY"
  exit 0
fi

# Write github-summary format to step summary
"$PYTHON" /tmp/mimicker_run.py report --url "http://localhost:${PORT}" --format github-summary >> "\$GITHUB_STEP_SUMMARY" 2>/dev/null || true

# Optionally fail on unused stubs
if [ "${FAIL_ON_UNUSED}" = "true" ]; then
  UNUSED=\$(echo "\$REPORT_JSON" | "$PYTHON" -c "import sys,json; d=json.load(sys.stdin); print(len(d['unused_stubs']))")
  if [ "\$UNUSED" -gt 0 ]; then
    echo "::error::Mimicker: \$UNUSED stub(s) were never hit — possible test decay." >&2
    exit 1
  fi
fi
REPORT_EOF
        chmod +x "$REPORT_SCRIPT"

        echo "url=http://localhost:${PORT}" >> "$GITHUB_OUTPUT"
        echo "report-script=${REPORT_SCRIPT}" >> "$GITHUB_OUTPUT"
